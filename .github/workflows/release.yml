name: Release VoCript

# Se dispara al subir una etiqueta de versión (p. ej. `git tag v0.8.4 && git push --tags`)
# o manualmente desde la pestaña Actions de GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write # necesario para crear la Release y subir el instalador
    # windows-2022 = Visual Studio 2022 estable. NO usar windows-latest: ahora
    # redirige a la imagen vs2026 (preview), cuyo toolchain rompe la compilación
    # de whisper.cpp (errores STL1000 / C1083 en vulkan-shaders-gen).
    runs-on: windows-2022

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "handy-src/src-tauri -> target"

      - name: Instalar LLVM (libclang para bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1"

      - name: Instalar Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.350.0
          install_runtime: true
          cache: true

      - name: Instalar Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      # Activa el entorno de MSVC (cl.exe + INCLUDE/LIB) para que CMake/Ninja
      # puedan compilar whisper.cpp. Sin esto, cl.exe falla al compilar el test
      # de CMake en el runner de GitHub.
      - name: Activar entorno MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Instalar dependencias del frontend
        working-directory: handy-src
        run: bun install

      - name: Descargar modelo Silero VAD (recurso requerido)
        working-directory: handy-src
        shell: bash
        run: |
          mkdir -p src-tauri/resources/models
          curl -L -o src-tauri/resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Compilar, firmar y publicar la Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
          CMAKE_GENERATOR: Ninja
          # Forzar MSVC (cl.exe) como compilador de C/C++ para whisper.cpp.
          # LLVM/clang solo se usa para libclang (bindgen). Sin esto, CMake elige
          # clang para compilar whisper y choca con la STL de MSVC (error STL1000:
          # "expected Clang 20 or newer").
          CC: cl
          CXX: cl
          # Target dir CORTO: whisper.cpp (vulkan-shaders-gen) crea rutas muy
          # anidadas que superan el límite de 260 caracteres de Windows y rompen
          # cl.exe (C1083). Un target corto las mantiene dentro del límite.
          CARGO_TARGET_DIR: C:\t
          # CRÍTICO para portabilidad: sin esto, ggml/whisper.cpp se compila con
          # -march=native usando las instrucciones del runner de GitHub (Xeon con
          # AVX-512). Las CPUs de consumo modernas (Intel Core Ultra, etc.) NO
          # tienen AVX-512 → la app crashea con "instrucción ilegal" (0xc000001d)
          # al transcribir. GGML_NATIVE=OFF + baseline AVX2 = binario portable que
          # funciona en cualquier CPU x86-64 desde 2013. whisper-rs-sys reenvía
          # estas variables GGML_* directamente a CMake.
          GGML_NATIVE: "OFF"
          GGML_AVX: "ON"
          GGML_AVX2: "ON"
          GGML_FMA: "ON"
          GGML_F16C: "ON"
          GGML_AVX512: "OFF"
          # Claves de firma del auto-updater (se configuran como secrets del repo).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: handy-src
          tagName: ${{ github.ref_name }}
          releaseName: "VoCript ${{ github.ref_name }}"
          releaseBody: "Descarga el instalador (`.exe`) más abajo. Si ya tienes VoCript instalado, se actualizará solo."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # Sube una copia del instalador con nombre fijo (sin versión) para que
      # el botón de descarga del README ("...releases/latest/download/VoCript-Setup.exe")
      # funcione siempre, sin importar la versión publicada.
      - name: Subir copia del instalador con nombre fijo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          installer=$(find C:/t/release/bundle/nsis -maxdepth 1 -name "*-setup.exe" | head -n1)
          cp "$installer" VoCript-Setup.exe
          gh release upload "${{ github.ref_name }}" VoCript-Setup.exe --clobber --repo ${{ github.repository }}
